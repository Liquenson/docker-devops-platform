name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t docker-devops-app ./app

      - name: Run container (test)
        run: |
          docker run -d -p 8000:8000 --name test-app docker-devops-app
          sleep 5

      - name: Health check
        run: |
          curl --fail http://localhost:8000/health || exit 1

      - name: Stop container
        run: docker stop test-app
